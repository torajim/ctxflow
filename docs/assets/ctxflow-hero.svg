<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="80" x2="960" y2="80"/><line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="240" x2="960" y2="240"/><line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/><line x1="720" y1="0" x2="720" y2="320"/>
  </g>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="160" rx="160" ry="100" fill="#6366f1" opacity="0.06" filter="url(#blur1)"/>
  <ellipse cx="760" cy="160" rx="160" ry="100" fill="#a78bfa" opacity="0.06" filter="url(#blur1)"/>
  <ellipse cx="480" cy="160" rx="120" ry="80" fill="#818cf8" opacity="0.04" filter="url(#blur1)"/>

  <!-- Flow lines (the "ctx" flowing between nodes) -->
  <g opacity="0.5">
    <!-- Top arc -->
    <path d="M 220 140 C 350 60, 610 60, 740 140" stroke="url(#flow)" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
    <!-- Middle straight -->
    <path d="M 250 160 L 710 160" stroke="url(#flow)" stroke-width="1" stroke-dasharray="4 6" fill="none"/>
    <!-- Bottom arc -->
    <path d="M 220 180 C 350 260, 610 260, 740 180" stroke="url(#flow)" stroke-width="1.5" stroke-dasharray="6 4" fill="none"/>
  </g>

  <!-- Animated dots along paths (static representation) -->
  <g fill="#a78bfa">
    <circle cx="340" cy="88" r="3" opacity="0.9"/><circle cx="480" cy="72" r="2.5" opacity="0.7"/>
    <circle cx="620" cy="88" r="3" opacity="0.9"/><circle cx="380" cy="160" r="2" opacity="0.5"/>
    <circle cx="520" cy="160" r="2.5" opacity="0.6"/><circle cx="660" cy="160" r="2" opacity="0.5"/>
    <circle cx="340" cy="232" r="3" opacity="0.9"/><circle cx="480" cy="248" r="2.5" opacity="0.7"/>
    <circle cx="620" cy="232" r="3" opacity="0.9"/>
  </g>

  <!-- Worker Node: Left (Stefano) -->
  <g>
    <rect x="120" y="110" width="160" height="100" rx="12" fill="#1e1e36" stroke="#4f46e5" stroke-width="1.5" opacity="0.95"/>
    <rect x="120" y="110" width="160" height="100" rx="12" fill="url(#glow1)" opacity="0.3"/>
    <!-- Terminal icon -->
    <rect x="138" y="126" width="28" height="20" rx="3" fill="none" stroke="#818cf8" stroke-width="1.2"/>
    <polyline points="143,132 149,137 143,142" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="151" y1="142" x2="158" y2="142" stroke="#818cf8" stroke-width="1.2" stroke-linecap="round"/>
    <text x="172" y="140" font-family="monospace, 'SF Mono', 'Fira Code'" font-size="11" fill="#c4b5fd" font-weight="600">Worker A</text>
    <!-- Status -->
    <circle cx="140" cy="165" r="4" fill="#34d399"/>
    <text x="150" y="169" font-family="monospace, 'SF Mono'" font-size="9.5" fill="#94a3b8">working</text>
    <!-- Files -->
    <text x="138" y="190" font-family="monospace, 'SF Mono'" font-size="8.5" fill="#64748b">src/auth.ts  src/types.ts</text>
  </g>

  <!-- Worker Node: Right (Jimin) -->
  <g>
    <rect x="680" y="110" width="160" height="100" rx="12" fill="#1e1e36" stroke="#7c3aed" stroke-width="1.5" opacity="0.95"/>
    <rect x="680" y="110" width="160" height="100" rx="12" fill="url(#glow2)" opacity="0.3"/>
    <!-- Terminal icon -->
    <rect x="698" y="126" width="28" height="20" rx="3" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    <polyline points="703,132 709,137 703,142" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="711" y1="142" x2="718" y2="142" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
    <text x="732" y="140" font-family="monospace, 'SF Mono', 'Fira Code'" font-size="11" fill="#c4b5fd" font-weight="600">Worker B</text>
    <!-- Status -->
    <circle cx="700" cy="165" r="4" fill="#34d399"/>
    <text x="710" y="169" font-family="monospace, 'SF Mono'" font-size="9.5" fill="#94a3b8">working</text>
    <!-- Files -->
    <text x="698" y="190" font-family="monospace, 'SF Mono'" font-size="8.5" fill="#64748b">src/users.ts  src/db.ts</text>
  </g>

  <!-- Center sync hub -->
  <g>
    <circle cx="480" cy="160" r="36" fill="#1e1e36" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="480" cy="160" r="36" fill="#6366f1" opacity="0.08"/>
    <!-- Sync arrows icon -->
    <path d="M 468 152 L 492 152 L 486 146" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 492 168 L 468 168 L 474 174" fill="none" stroke="#818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="480" y="161" font-family="monospace, 'SF Mono'" font-size="7" fill="#64748b" text-anchor="middle" dy="24">git sync</text>
  </g>

  <!-- Logo text -->
  <text x="480" y="38" font-family="monospace, 'SF Mono', 'Fira Code', 'Courier New'" font-size="28" fill="#e0e7ff" text-anchor="middle" font-weight="700" letter-spacing="3">ctxflow</text>
  <text x="480" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="1">context flows, teams converge</text>

  <!-- Bottom tagline -->
  <text x="480" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Real-time LLM context synchronization for collaborative vibe coding</text>
</svg>
